<script>
$(document).ready(function (){
	$("#en_tip").popover({
		'title':'encodeURI',
		'content':'使用Javascript encodeURI() 函数，用于完整的URL编码。',
		'placement':'right'
    });
	$("#co_tip").popover({
		'title':'encodeURIComponent',
		'content':'使用Javascript encodeURIComponent() 函数，用于拼接URL的参数。',
		'placement':'right'
    });
});
function encode_uri() {
	if($("#co_t").attr("checked"))
		$("#result").val(encodeURIComponent($("#source").val()));
	else
		$("#result").val(encodeURI($("#source").val()));
}

function decode_uri() { 
	if($("#co_t").attr("checked"))
		$("#source").val(decodeURIComponent($("#result").val()));
	else
		$("#source").val(decodeURI($("#result").val()));
}

		</form>

<script>
function verifyEmail(){
	if(null == $("#advice_email").val().match(/^\w+([-+.']\w+)*@\w+([-.]\w+)*\.\w+([-.]\w+)*$/)){
		$("#email_error").html(" email输入错误 ");
		$("#advice_email").focus();
	}
	else{
		$("#email_error").html("<i class='icon-ok'></i>");
		$("#advice_submit").removeAttr("disabled");
	}
}
$(document).ready(function (){
	$("#advice_submit").click(function (){
		$.post("/action/advice/add_advice",
		{ tool_name : $("#tool_name_f").val() , email: $("#advice_email").val(), content: $("#advice_content").val() ,verifyCode: $("#verifyCode").val()},
		function (result){
			var m=eval('(' + result + ')');
			if("ok"==m.msg){
				alert("谢谢您的建议，我们会参考您的建议使ostools变得更好！");
				$('#advice').modal('hide');
				$("#captcha_code").attr("src",'/action/jsbin/captcha?'+new Date().getTime());
			}
			else{
				alert(m.msg);
			}
		});
	});
});
</script>
